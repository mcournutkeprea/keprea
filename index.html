<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
    <!-- Pas de <title>/<meta name="description"> ici : chaque page les définit via son composant <Head> (vite-react-ssg).
         Les laisser ici dupliquait ces balises sur les 18 pages du build SSG (audit SEO 02/07/2026). -->

    <!-- og:title/og:description/twitter:title/twitter:description définis par page (voir <Head> de chaque page) —
         les laisser ici en plus dupliquait ces balises sur les 18 pages (même bug que le <title>, audit SEO 02/07/2026).
         og:image/twitter:image restent ici en valeur par défaut partagée : pas d'image sociale dédiée par page pour l'instant. -->
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://keprea.com/lovable-uploads/eprea_Main_Logo_800x600.jpg">

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://keprea.com/lovable-uploads/eprea_Main_Logo_800x600.jpg">
  <!-- Bascule domaine effectuée (13/07/2026) : url/logo/images/canonical alignés sur https://keprea.com (domaine définitif). -->

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "Keprea",
    "url": "https://keprea.com",
    "logo": "https://keprea.com/logo-keprea.png",
    "description": "Keprea développe des biosolutions à base d'insectes pour l'agriculture durable.",
    "address": {
      "@type": "PostalAddress",
      "addressLocality": "Dole",
      "addressRegion": "Jura",
      "postalCode": "39100",
      "addressCountry": "FR"
    }
  }
  </script>
</head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
